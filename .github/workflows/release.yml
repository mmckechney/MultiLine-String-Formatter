name: Create and Upload Release

on:
  push:
    tags:
    - 'v*'

jobs:
  release:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Install MAUI workload
      run: dotnet workload install maui-windows

    - name: Restore dependencies
      run: dotnet restore src/MultiLineStringFormatter.sln -r win-x64

    - name: Build
      run: dotnet build src/MultiLineStringFormatter.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test src/MultiLineStringFormatter.Tests --configuration Release --no-build

    - name: Publish self-contained
      run: .\publish.ps1 -OutputDir .\publish
      shell: pwsh

    - name: Create zip archive
      run: Compress-Archive -Path .\publish\* -DestinationPath .\MultiLineStringFormatter.zip
      shell: pwsh

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MultiLineStringFormatter
        path: publish/

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: ./MultiLineStringFormatter.zip